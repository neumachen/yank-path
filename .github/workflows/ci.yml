# CI pipeline: runs on every push to main and every PR
name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Full Rust quality gate: fmt, clippy, test, build, MSRV
  checks:
    name: Rust Checks
    uses: ./.github/workflows/reusable.rust-checks.yml
