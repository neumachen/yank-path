name: Release

on:
  release:
    types: [published]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always

jobs:
  publish:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Verify tag matches crate version
        env:
          TAG_NAME: ${{ github.event.release.tag_name }}
        run: |
          tag_version="${TAG_NAME#v}"
          crate_version="$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[0].version')"
          echo "tag_version=${tag_version}"
          echo "crate_version=${crate_version}"
          if [ "${tag_version}" != "${crate_version}" ]; then
            echo "Tag version (${tag_version}) does not match crate version (${crate_version})"
            exit 1
          fi

      - name: Build (locked)
        run: cargo build --release --locked

      - name: Test
        run: cargo test --all --locked

      - name: Publish to crates.io
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          if [ -z "${CARGO_REGISTRY_TOKEN}" ]; then
            echo "CARGO_REGISTRY_TOKEN secret is not set; skipping crates.io publish"
            exit 0
          fi
          cargo publish --locked

  build-binaries:
    name: Build binaries (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Upload binary
        uses: taiki-e/upload-rust-binary-action@v1
        with:
          bin: yank-path
          target: ${{ matrix.target }}
          archive: yank-path-$tag-$target
          include: README.md,LICENSE-MIT,LICENSE-APACHE
          token: ${{ secrets.GITHUB_TOKEN }}
